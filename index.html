<!DOCTYPE html>
<html>
<head>
  <title>Quick Order Website</title>
</head>
<body>

<h2>🛒 Place Your Order</h2>

<!-- PRODUCT SECTION -->
<label>Product Name:</label>
<input type="text" id="product" placeholder="Enter product name"><br><br>

<label>Quantity:</label>
<input type="number" id="qty" value="1"><br><br>

<!-- LOCATION BUTTON -->
<button onclick="getLocation()">📍 Use Live Location</button>

<p id="locationText"></p>

<!-- ORDER BUTTON -->
<br>
<button onclick="sendOrder()">💬 Send Order on WhatsApp</button>

<script>
let lat = "";
let lon = "";

// GET LOCATION
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        alert("Geolocation not supported");
    }
}

function showPosition(position) {
    lat = position.coords.latitude;
    lon = position.coords.longitude;

    document.getElementById("locationText").innerHTML =
    "📍 Location Captured!";
}

function showError() {
    alert("Unable to get location. Please allow permission.");
}

// SEND ORDER TO WHATSAPP
function sendOrder() {
    let product = document.getElementById("product").value;
    let qty = document.getElementById("qty").value;

    if (!product) {
        alert("Please enter product name");
        return;
    }

    let message =
`🛒 New Order
Product: ${product}
Quantity: ${qty}
Location: https://www.google.com/maps?q=${lat},${lon}`;

    let phone = "91YOURNUMBERHERE"; // <-- change this

    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}
</script>

</body>
</html>
