<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickDropp</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#222; color:#fff; padding:15px; text-align:center; }
.container { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; padding:15px; }
.product { background:#fff; padding:10px; border-radius:10px; text-align:center; }
button { padding:8px; border:none; border-radius:5px; cursor:pointer; margin:2px; }
.add { background:green; color:#fff; }
.remove { background:red; color:#fff; }
.pay { background:blue; color:#fff; width:100%; margin-top:10px; }
.cart { position:fixed; right:10px; top:10px; background:#fff; padding:15px; width:260px; border-radius:10px; }
input, textarea { width:100%; padding:6px; margin-top:5px; }
footer { background:#222; color:#fff; text-align:center; padding:10px; margin-top:20px; }
</style>
</head>
<body>

<header>
<h1>QuickDropp</h1>
</header>

<div class="container" id="products"></div>

<div class="cart">
<h3>Cart</h3>
<ul id="cart"></ul>
<p>Total: ₹<span id="total">0</span></p>

<h4>Customer Details</h4>
<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Delivery Address"></textarea>

<button class="pay" onclick="payNow()">Pay Now</button>
</div>

<footer>
<p>Contact: 8849322203 | 8000329448 | 9726303974</p>
</footer>

<script>
const products = [
 {name:"Shoes", price:999},
 {name:"T-Shirt", price:499},
 {name:"Watch", price:1499}
];

let cart = [];

function loadProducts(){
 let container = document.getElementById("products");
 products.forEach((p,i)=>{
  container.innerHTML += `
   <div class='product'>
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <button class='add' onclick='add(${i})'>Add</button>
   </div>`;
 });
}

function add(i){
 let found = cart.find(item => item.name === products[i].name);
 if(found){
  found.qty++;
 } else {
  cart.push({...products[i], qty:1});
 }
 updateCart();
}

function removeItem(name){
 cart = cart.filter(item => item.name !== name);
 updateCart();
}

function updateCart(){
 let list = document.getElementById("cart");
 let total = 0;
 list.innerHTML = "";

 cart.forEach(item=>{
  let itemTotal = item.price * item.qty;
  list.innerHTML += `
   <li>
    ${item.name} x${item.qty} = ₹${itemTotal}
    <button class='remove' onclick="removeItem('${item.name}')">X</button>
   </li>`;
  total += itemTotal;
 });

 document.getElementById("total").innerText = total;
}

function payNow(){
 let total = document.getElementById("total").innerText;
 let name = document.getElementById("name").value;
 let phone = document.getElementById("phone").value;
 let address = document.getElementById("address").value;

 if(total == 0){ alert("Cart is empty"); return; }
 if(!name || !phone || !address){ alert("Fill all details"); return; }

 let options = {
  key: "YOUR_KEY_ID",
  amount: total * 100,
  currency: "INR",
  name: "QuickDropp",
  description: "Order Payment",
  handler: function (response){
    let msg = `Order from QuickDropp%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0AAmount: ₹${total}%0APayment ID: ${response.razorpay_payment_id}`;
    window.location.href = `https://wa.me/918849322203?text=${msg}`;
  }
 };

 let rzp = new Razorpay(options);
 rzp.open();
}

loadProducts();
</script>

</body>
</html>
