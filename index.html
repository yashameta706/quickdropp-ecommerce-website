<!DOCTYPE html>
<html>
<head>
  <title>Mini Shop Pro</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2874f0">

  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }

    header {
      background:#2874f0;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
    }

    .container { padding:10px; }

    .card {
      background:white;
      margin:10px 0;
      padding:10px;
      border-radius:10px;
      display:flex;
      gap:10px;
      align-items:center;
    }

    img {
      width:80px;
      height:80px;
      border-radius:10px;
      object-fit:cover;
    }

    button {
      padding:6px 10px;
      margin:3px;
      cursor:pointer;
      border:none;
      border-radius:5px;
    }

    .add { background:green; color:white; }
    .remove { background:red; color:white; }

    #cart {
      background:white;
      padding:10px;
      border-radius:10px;
    }

    input {
      padding:8px;
      width:90%;
      margin:5px 0;
    }

    .loginBox {
      background:white;
      padding:10px;
      margin:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>🛒 Mini Shop Pro (No Payment)</header>

<!-- LOGIN -->
<div class="loginBox" id="loginBox">
  <h3>🔐 Login</h3>
  <input id="user" placeholder="Enter your name">
  <button onclick="login()">Login</button>
</div>

<!-- PRODUCTS -->
<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/80">
    <div>
      <b>Shirt</b><br>₹299<br>
      <button class="add" onclick="add('Shirt',299)">Add</button>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/80">
    <div>
      <b>Shoes</b><br>₹799<br>
      <button class="add" onclick="add('Shoes',799)">Add</button>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/80">
    <div>
      <b>Watch</b><br>₹499<br>
      <button class="add" onclick="add('Watch',499)">Add</button>
    </div>
  </div>

</div>

<!-- CART -->
<div class="container">
  <div id="cart">
    <h3>🛒 Cart</h3>
    <ul id="list"></ul>
    <p id="total"></p>

    <button onclick="getLocation()">📍 Add Live Location</button><br><br>
    <button onclick="send()">💬 Send WhatsApp Order</button>
  </div>
</div>

<!-- ORDER STATUS -->
<div class="container">
  <h3>📦 Order Status</h3>
  <p id="status">No order yet</p>
</div>

<script>
let cart = [];
let total = 0;
let user = "";
let lat = "", lon = "";

/* LOGIN */
function login() {
  user = document.getElementById("user").value;
  if (!user) return alert("Enter name");
  document.getElementById("loginBox").innerHTML = "👋 Welcome " + user;
}

/* ADD TO CART */
function add(name, price) {
  cart.push({name, price});
  total += price;
  update();
}

/* REMOVE ITEM */
function remove(i) {
  total -= cart[i].price;
  cart.splice(i,1);
  update();
}

/* UPDATE CART */
function update() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  cart.forEach((c,i) => {
    list.innerHTML += `
      <li>
        ${c.name} - ₹${c.price}
        <button class="remove" onclick="remove(${i})">X</button>
      </li>
    `;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

/* LOCATION */
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    alert("📍 Location Added");
  }, () => alert("Allow location permission"));
}

/* STATUS */
function setStatus(text) {
  document.getElementById("status").innerText = text;
}

/* WHATSAPP ORDER */
function send() {
  if (cart.length == 0) return alert("Cart is empty");

  let msg = "🛒 Order from " + user + "\n\n";

  cart.forEach(c => {
    msg += `- ${c.name} ₹${c.price}\n`;
  });

  msg += `\nTotal: ₹${total}`;
  msg += `\nLocation: https://www.google.com/maps?q=${lat},${lon}`;

  setStatus("⏳ Order Sent");

  let phone = "919351610143";

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}

/* PWA SERVICE WORKER */
if ("serviceWorker" in navigator) {
  const sw = `
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open('shop-cache').then(cache => {
          return cache.addAll(['./']);
        })
      );
    });

    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => caches.match('./')));
    });
  `;

  const blob = new Blob([sw], {type: "application/javascript"});
  const swURL = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL);
}
</script>

</body>
</html>
