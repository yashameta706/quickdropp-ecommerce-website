<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickDropp Final</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
body{font-family:Arial;margin:0;background:#f1f3f6}
header{background:#131921;color:#fff;padding:10px;display:flex;justify-content:space-between;align-items:center}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:10px}
.product{background:#fff;padding:10px;border-radius:8px}
.product img{width:100%;height:140px;object-fit:cover}
button{padding:6px;border:none;border-radius:4px;cursor:pointer}

/* THREE DOT MENU */
.menu{font-size:22px;cursor:pointer}

.cart{
 position:fixed;
 right:10px;
 top:70px;
 background:#fff;
 padding:10px;
 width:260px;
 border-radius:10px;
 display:none;
 box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<header>
<h2>QuickDropp</h2>
<input placeholder="Search" onkeyup="search(this.value)">
<div class="menu" onclick="toggleCart()">⋮</div>
</header>

<div class="container" id="products"></div>

<div class="cart" id="cartBox">
<h4>Cart</h4>
<ul id="cart"></ul>
<p>Total ₹<span id="total">0</span></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="getLocation()">Use Live Location 📍</button>
<iframe id="map" width="100%" height="120"></iframe>

<button onclick="payNow()">Checkout</button>
</div>

<script>
const products=[
{name:"T-Shirt",price:500,img:"https://images.unsplash.com/photo-1521572163474"},
{name:"Shoes",price:1000,img:"https://images.unsplash.com/photo-1542291026"},
{name:"Headphones",price:2000,img:"https://images.unsplash.com/photo-1518441902110"}
];

let cart=[];

function toggleCart(){
 let cartBox=document.getElementById("cartBox");
 cartBox.style.display = cartBox.style.display === "block" ? "none" : "block";
}

function loadProducts(list=products){
 let c=document.getElementById("products");c.innerHTML="";
 list.forEach((p,i)=>{
  c.innerHTML+=`<div class='product'>
  <img src='${p.img}'>
  <h4>${p.name}</h4>
  <p>₹${p.price}</p>
  <button onclick='add(${i})'>Add</button>
  </div>`;
 });
}

function search(q){
 loadProducts(products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
}

function add(i){
 let item=products[i];
 let f=cart.find(c=>c.name==item.name);
 if(f)f.qty++; else cart.push({...item,qty:1});
 updateCart();
}

function updateCart(){
 let list=document.getElementById("cart");let total=0;list.innerHTML="";
 cart.forEach(i=>{let t=i.price*i.qty;total+=t;list.innerHTML+=`<li>${i.name} x${i.qty}</li>`});
 document.getElementById("total").innerText=total;
}

function payNow(){
 let total=document.getElementById("total").innerText;
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;
 let address=document.getElementById("address").value;

 if(!total||!name||!phone||!address) return alert("Fill all details");

 let options={
 key:"YOUR_KEY_ID",
 amount:total*100,
 currency:"INR",
 name:"QuickDropp",
 handler:function(res){
  let msg=`Order from QuickDropp%0AName:${name}%0APhone:${phone}%0AAddress:${address}%0AAmount:${total}%0APayment:${res.razorpay_payment_id}`;
  window.location.href=`https://wa.me/91${phone}?text=${msg}`;
 }
 };
 new Razorpay(options).open();
}

function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;
  document.getElementById("map").src=`https://www.google.com/maps?q=${lat},${lon}&output=embed`;

  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
  .then(r=>r.json())
  .then(d=>{
   document.getElementById("address").value=d.display_name;
  });
 });
}

loadProducts();
</script>

</body>
</html>
